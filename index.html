<script type="text/babel">
const { useEffect, useState, useRef } = React;

function Caret() {
  const [on, setOn] = useState(true);
  useEffect(() => { const t = setInterval(() => setOn(o => !o), 520); return () => clearInterval(t); }, []);
  return <span style={{ opacity: on ? 1 : 0 }}>▊</span>;
}

function BootBanner({ theme, strings, density }) {
  const [shown, setShown] = useState(0);
  useEffect(() => {
    setShown(0);
    const interval = setInterval(() => {
      setShown(s => {
        if (s >= strings.bootLines.length) { clearInterval(interval); return s; }
        return s + 1;
      });
    }, 260);
    return () => clearInterval(interval);
  }, [strings]);

  return (
    <div style={{
      fontFamily: theme.fontMono,
      color: theme.textDim,
      fontSize: density === 'compact' ? 11 : 12,
      lineHeight: 1.65,
      padding: density === 'compact' ? '12px 0 4px' : '20px 0 10px',
    }}>
      {strings.bootLines.slice(0, shown).map((l, i) => (
        <div key={i}>
          <span style={{ color: theme.accent }}>$</span>{' '}
          <span>{l}</span>
          {i === shown - 1 && shown < strings.bootLines.length + 1 && <Caret />}
        </div>
      ))}
    </div>
  );
}

function Hero({ theme, strings, density }) {
  const pad = density === 'compact' ? '20px 28px' : '40px 48px';
  return (
    <section data-screen-label="hero" style={{
      borderBottom: `1px solid ${theme.border}`,
      padding: pad,
      position: 'relative',
    }}>
      <BootBanner theme={theme} strings={strings} density={density} />
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'minmax(0, 1fr) minmax(0, 380px)',
        gap: density === 'compact' ? 32 : 56,
        alignItems: 'start',
        marginTop: density === 'compact' ? 12 : 24,
      }}>
        <div>
          <div style={{
            fontFamily: theme.fontMono,
            color: theme.textDim,
            fontSize: 12,
            marginBottom: 10,
            letterSpacing: 1,
          }}>
            ~/portfolio <span style={{ color: theme.accent }}>main</span> $ whoami
          </div>
          <h1 style={{
            fontFamily: theme.fontMono,
            color: theme.textBright,
            fontSize: density === 'compact' ? 42 : 64,
            margin: 0,
            fontWeight: 700,
            letterSpacing: -1,
            textShadow: theme.glow,
            lineHeight: 1.0,
          }}>
            {strings.heroName}<span style={{ color: theme.accent }}>_</span>
          </h1>
          <div style={{
            fontFamily: theme.fontMono,
            color: theme.text,
            fontSize: density === 'compact' ? 14 : 17,
            marginTop: 10,
            opacity: 0.9,
          }}>
            &gt; {strings.heroRole}
          </div>
          <p style={{
            fontFamily: theme.fontSans,
            color: theme.text,
            fontSize: density === 'compact' ? 13 : 15,
            lineHeight: 1.7,
            maxWidth: 620,
            marginTop: 24,
            textWrap: 'pretty',
          }}>
            {strings.heroBio}
          </p>
        </div>
        <div style={{
          border: `1px solid ${theme.border}`,
          background: theme.panelSoft,
          fontFamily: theme.fontMono,
          fontSize: 12,
        }}>
          <div style={{
            padding: '8px 12px',
            borderBottom: `1px solid ${theme.border}`,
            color: theme.textDim,
            display: 'flex',
            justifyContent: 'space-between',
          }}>
            <span>~/identity.toml</span>
            <span style={{ color: theme.accent }}>●</span>
          </div>
          <div style={{ padding: '14px 16px' }}>
            {strings.heroMeta.map((m, i) => (
              <div key={i} style={{ display: 'flex', padding: '5px 0' }}>
                <span style={{ color: theme.textDim, width: 84, flexShrink: 0 }}>{m.k}</span>
                <span style={{ color: theme.textDim }}>=&nbsp;</span>
                <span style={{ color: theme.textBright }}>"{m.v}"</span>
              </div>
            ))}

window.Hero = Hero;

function Timeline({ theme, density, lang, projects, selectedId, setSelectedId }) {
  const years = {};
  projects.forEach(p => { (years[p.year] = years[p.year] || []).push(p); });
  const yearKeys = Object.keys(years).sort().reverse();

  return (
    <div style={{ fontFamily: theme.fontMono, position: 'relative' }}>
      {yearKeys.map(y => (
        <div key={y} style={{ marginBottom: 28 }}>
          <div style={{
            display: 'flex',
            alignItems: 'center',
            gap: 10,
            color: theme.textDim,
            fontSize: 11,
            marginBottom: 10,
            letterSpacing: 1,
          }}>
            <span style={{ color: theme.accent }}>▸</span>
            <span style={{ color: theme.textBright }}>{y}</span>
            <span style={{ flex: 1, height: 1, background: theme.border }} />
            <span>{years[y].length} projects</span>

          <div style={{ position: 'relative', paddingLeft: 18 }}>
            <div style={{
              position: 'absolute', left: 4, top: 6, bottom: 6, width: 1,
              background: theme.border,
            }} />
            {years[y].map(p => {
              const active = p.id === selectedId;
              return (
                <button key={p.id}
                  onClick={() => setSelectedId(p.id)}
                  style={{
                    display: 'block',
                    width: '100%',
                    textAlign: 'left',
                    background: active ? theme.panel : 'transparent',
                    border: `1px solid ${active ? theme.accent : 'transparent'}`,
                    borderLeft: `1px solid ${active ? theme.accent : 'transparent'}`,
                    padding: density === 'compact' ? '8px 12px' : '12px 14px',
                    margin: '4px 0',
                    cursor: 'pointer',
                    color: 'inherit',
                    fontFamily: 'inherit',
                    position: 'relative',
                    transition: 'background 120ms, border 120ms',

                  onMouseEnter={e => { if (!active) e.currentTarget.style.background = theme.panelSoft; }}
                  onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
                >
                  <span style={{
                    position: 'absolute',
                    left: -18,
                    top: density === 'compact' ? 12 : 16,
                    width: 9, height: 9,
                    background: active ? theme.accent : theme.bg,
                    border: `1px solid ${active ? theme.accent : theme.muted}`,
                    borderRadius: theme.id === 'modern' ? '50%' : 0,
                    boxShadow: active ? theme.glow : 'none',
                  }} />

                    <span>{p.date}</span>
                    <Tag theme={theme} kind={p.tag} />
                    <Status theme={theme} status={p.status} />

                  <div style={{
                    fontSize: density === 'compact' ? 14 : 15,
                    color: active ? theme.textBright : theme.text,

                    {p.oneliner}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function Tag({ theme, kind }) {
  const map = {
    WORK: { bg: theme.accent, fg: theme.bg },
    OSS:  { bg: 'transparent', fg: theme.accent, border: theme.accent },
    SIDE: { bg: 'transparent', fg: theme.textDim, border: theme.muted },
  };
  const s = map[kind] || map.WORK;
  return (
    <span style={{
      fontSize: 9,
      letterSpacing: 1,
      padding: '2px 6px',
      background: s.bg,
      color: s.fg,
      border: s.border ? `1px solid ${s.border}` : 'none',
      fontWeight: 700,
    }}>{kind}</span>
  );
}

function Status({ theme, status }) {
  const color = status === 'active' ? theme.accent

             : status === 'maintained' ? theme.warn

             : theme.textDim;
  const dashed = status === 'planned';
  return (
    <span style={{ fontSize: 10, color, display: 'flex', alignItems: 'center', gap: 4, fontStyle: dashed ? 'italic' : 'normal' }}>
      <span style={{
        width: 6, height: 6, borderRadius: '50%',
        background: dashed ? 'transparent' : color,
        border: dashed ? `1px dashed ${color}` : 'none',
        boxShadow: status === 'active' ? `0 0 6px ${color}` : 'none',

    </span>
  );
}

          {project.stack.map(s => (
            <span key={s} style={{
              fontSize: 10,

              color: theme.text,
              background: theme.panelSoft,
              border: `1px solid ${theme.border}`,
            }}>{s}</span>
          ))}
        </div>

        {project.metrics.length > 0 && (
          <div style={{
            display: 'grid',
            gridTemplateColumns: `repeat(${project.metrics.length}, 1fr)`,
            gap: 0,
            marginTop: 18,
            border: `1px solid ${theme.border}`,
          }}>
            {project.metrics.map((m, i) => (
              <div key={i} style={{
                padding: '10px 12px',
                borderRight: i < project.metrics.length - 1 ? `1px solid ${theme.border}` : 'none',
                background: theme.panelSoft,
              }}>
                <div style={{ color: theme.textDim, fontSize: 10, letterSpacing: 0.5 }}>{m.k}</div>
                <div style={{ color: theme.accent, fontSize: 18, fontWeight: 700, marginTop: 2, textShadow: theme.glow }}>{m.v}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ display: 'flex', borderTop: `1px solid ${theme.border}`, borderBottom: `1px solid ${theme.border}`, marginTop: 14 }}>
        {strings.detailTabs.map((t, i) => {
          const active = tab === i;
          return (
            <button key={i}
              onClick={() => setTab(i)}
              style={{
                flex: 1,
                padding: '10px 12px',
                background: active ? theme.bg : 'transparent',
                color: active ? theme.accent : theme.textDim,
                border: 'none',
                borderRight: i < strings.detailTabs.length - 1 ? `1px solid ${theme.border}` : 'none',
                borderBottom: active ? `2px solid ${theme.accent}` : '2px solid transparent',
                cursor: 'pointer',
                fontFamily: 'inherit',
                fontSize: 12,
                textAlign: 'center',
                fontWeight: active ? 700 : 400,
              }}
            >
              <span style={{ color: theme.textDim, marginRight: 4 }}>0{i+1}.</span>{t}
            </button>
          );
        })}
      </div>

      <div style={{ padding: density === 'compact' ? '18px 20px' : '24px 28px' }}>
        {tab === 2 && project.diagram && (
          <pre style={{
            margin: '0 0 16px',
            padding: '14px 16px',
            background: theme.bg,
            border: `1px solid ${theme.border}`,
            color: theme.textBright,
            fontFamily: theme.fontMono,
            fontSize: 11,
            lineHeight: 1.55,
            overflowX: 'auto',
            whiteSpace: 'pre',
            textShadow: theme.glow,
          }}>{project.diagram}</pre>
        )}
        {content.length === 0 && (
          <div style={{ color: theme.textDim }}>// no notes yet</div>
        )}
        {content.map((line, i) => (
          <div key={i} style={{
            display: 'flex',
            gap: 12,
            padding: '6px 0',
            color: theme.text,
            fontSize: 13,
            lineHeight: 1.65,
            fontFamily: theme.fontSans,
          }}>
            <span style={{ color: theme.accent, fontFamily: theme.fontMono, flexShrink: 0 }}>
              {String(i + 1).padStart(2, '0')}
            </span>
            <span style={{ textWrap: 'pretty' }}>{line}</span>
          </div>
        ))}
      </div>

      {project.links.length > 0 && (
        <div style={{
          display: 'flex',
          gap: 14,
          padding: '14px 20px',
          borderTop: `1px solid ${theme.border}`,
          background: theme.panelSoft,
        }}>
          {project.links.map((l, i) => (
            <a key={i} href={l.href} style={{ color: theme.accent, textDecoration: 'none', fontSize: 12 }}>
              → {l.label}
            </a>
          ))}
        </div>
      )}
    </div>
  );
}

function ChromeDot({ c }) {
  return <span style={{ width: 10, height: 10, background: c, borderRadius: '50%', display: 'inline-block', opacity: 0.85 }} />;
}

window.ProjectsSection = ProjectsSection;
</script>

<script type="text/babel">
function TweaksPanel({ active, state, setState, onReset }) {
  if (!active) return null;
  const themes = ['classic', 'amber', 'modern'];
  const fonts = ['JetBrains Mono + Inter', 'IBM Plex Mono + Plex Sans', 'Fira Code + Geist', 'Space Mono + Space Grotesk'];
  const densities = ['compact', 'comfortable'];
  const langs = ['ko', 'en'];

  const t = window.THEMES[state.theme];

  return (
    <div style={{
      position: 'fixed',
      right: 20,
      top: 20,
      width: 300,
      maxHeight: 'calc(100vh - 40px)',
      overflowY: 'auto',
      background: t.panel,
      border: `1px solid ${t.border}`,
      color: t.text,
      fontFamily: t.fontMono,
      fontSize: 12,
      zIndex: 200,
      boxShadow: `0 20px 60px rgba(0,0,0,0.7)`,
    }}>
      {/* header */}
      <div style={{
        padding: '10px 14px',
        borderBottom: `1px solid ${t.border}`,
        background: t.panelSoft,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
      }}>
        <span style={{ color: t.accent, fontWeight: 700, fontSize: 13 }}>$ tweaks --live</span>
        <span style={{ color: t.textDim, fontSize: 10 }}>esc to close</span>
      </div>

      {/* aesthetic */}
      <TGroup t={t} label="// aesthetic">
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {themes.map(k => {
            const sel = state.theme === k;
            return (
              <button key={k} onClick={() => setState({ ...state, theme: k })} style={{
                padding: '5px 12px',
                border: `1px solid ${sel ? t.accent : t.border}`,
                background: sel ? t.panelSoft : 'transparent',
                color: sel ? t.accent : t.text,
                fontFamily: 'inherit',
                fontSize: 11,
                cursor: 'pointer',
              }}>{window.THEMES[k].label}</button>
            );
          })}
        </div>
      </TGroup>

      {/* font pairing */}
      <TGroup t={t} label="// font pairing">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          {fonts.map((f, i) => {
            const sel = state.fontIdx === i;
            return (
              <button key={i} onClick={() => setState({ ...state, fontIdx: i })} style={{
                display: 'block',
                width: '100%',
                padding: '7px 10px',
                border: `1px solid ${sel ? t.accent : t.border}`,
                background: sel ? t.panelSoft : 'transparent',
                color: sel ? t.accent : t.text,
                fontFamily: 'inherit',
                fontSize: 11,
                cursor: 'pointer',
                textAlign: 'left',
              }}>{f}</button>
            );
          })}
        </div>
      </TGroup>

      {/* density */}
      <TGroup t={t} label="// density">
        <div style={{ display: 'flex', gap: 6 }}>
          {densities.map(d => {
            const sel = state.density === d;
            return (
              <button key={d} onClick={() => setState({ ...state, density: d })} style={{
                padding: '5px 14px',
                border: `1px solid ${sel ? t.accent : t.border}`,
                background: sel ? t.panelSoft : 'transparent',
                color: sel ? t.accent : t.text,
                fontFamily: 'inherit',
                fontSize: 11,
                cursor: 'pointer',
              }}>{d}</button>
            );
          })}
        </div>
      </TGroup>

      {/* language */}
      <TGroup t={t} label="// language">
        <div style={{ display: 'flex', gap: 6 }}>
          {[['ko','한국어'],['en','English']].map(([v, label]) => {
            const sel = state.lang === v;
            return (
              <button key={v} onClick={() => setState({ ...state, lang: v })} style={{
                padding: '5px 14px',
                border: `1px solid ${sel ? t.accent : t.border}`,
                background: sel ? t.panelSoft : 'transparent',
                color: sel ? t.accent : t.text,
                fontFamily: 'inherit',
                fontSize: 11,
                cursor: 'pointer',
              }}>{label}</button>
            );
          })}
        </div>
      </TGroup>

      {/* section order */}
      <TGroup t={t} label="// section order">
        {state.sectionOrder.map((s, i) => (
          <div key={s} style={{
            display: 'flex', alignItems: 'center',
            padding: '7px 10px',
            border: `1px solid ${t.border}`,
            marginBottom: 4,
            background: t.panelSoft,
          }}>
            <span style={{ color: t.textDim, marginRight: 10, minWidth: 18 }}>{i+1}.</span>
            <span style={{ color: t.textBright, fontWeight: 700, flex: 1, letterSpacing: 0.3 }}>{s}</span>
            <button disabled={i === 0}
              onClick={() => {
                const o = [...state.sectionOrder];
                [o[i-1], o[i]] = [o[i], o[i-1]];
                setState({ ...state, sectionOrder: o });
              }}
              style={tBtnStyle(t, i === 0)}>↑</button>
            <button disabled={i === state.sectionOrder.length - 1}
              onClick={() => {
                const o = [...state.sectionOrder];
                [o[i+1], o[i]] = [o[i], o[i+1]];
                setState({ ...state, sectionOrder: o });
              }}
              style={tBtnStyle(t, i === state.sectionOrder.length - 1)}>↓</button>
          </div>
        ))}
      </TGroup>

      {/* effects */}
      <TGroup t={t} label="// effects">
        <TToggle t={t} label="scanlines overlay"
          value={state.scanlines}
          onChange={v => setState({ ...state, scanlines: v })} />
        <TToggle t={t} label="cursor glow"
          value={state.glow}
          onChange={v => setState({ ...state, glow: v })} />
      </TGroup>

      <div style={{ padding: '10px 14px', borderTop: `1px solid ${t.border}` }}>
        <button onClick={onReset} style={{
          width: '100%',
          padding: '7px 10px',
          background: 'transparent',
          border: `1px solid ${t.border}`,
          color: t.textDim,
          fontFamily: 'inherit',
          fontSize: 11,
          cursor: 'pointer',
          letterSpacing: 0.3,
        }}>rm -rf ./tweaks  # reset</button>
      </div>
    </div>
  );
}

function tBtnStyle(t, disabled) {
  return {
    width: 24, height: 24,
    background: 'transparent',
    border: `1px solid ${disabled ? t.muted : t.border}`,
    color: disabled ? t.muted : t.text,
    marginLeft: 4,
    cursor: disabled ? 'default' : 'pointer',
    fontFamily: 'inherit',
    fontSize: 12,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
  };
}

function TGroup({ t, label, children }) {
  return (
    <div style={{ padding: '12px 14px', borderBottom: `1px solid ${t.border}` }}>
      <div style={{ color: t.textDim, marginBottom: 10, fontSize: 11, letterSpacing: 0.3 }}>{label}</div>
      {children}
    </div>
  );
}

function TToggle({ t, label, value, onChange }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', padding: '6px 0' }}>
      <span style={{ flex: 1, color: t.text, fontSize: 12 }}>{label}</span>
      <button onClick={() => onChange(!value)} style={{
        width: 44, height: 22,
        background: 'transparent',
        border: 'none',
        padding: 0,
        cursor: 'pointer',
        position: 'relative',
        display: 'flex',
      }}>
        <span style={{
          display: 'block', width: 22, height: 22,
          background: value ? t.border : t.border,
          border: `1px solid ${t.border}`,
          flexShrink: 0,
        }} />
        <span style={{
          display: 'block', width: 22, height: 22,
          background: value ? t.accent : t.border,
          border: `1px solid ${value ? t.accent : t.border}`,
          flexShrink: 0,
          transition: 'background 150ms, border-color 150ms',
        }} />
      </button>
    </div>
  );
}

window.Tweaks = TweaksPanel;
</script>

<script type="text/babel">
const FONT_STACKS = [
  { mono: "'JetBrains Mono', ui-monospace, monospace", sans: "'Inter', system-ui, sans-serif" },
  { mono: "'IBM Plex Mono', ui-monospace, monospace", sans: "'IBM Plex Sans', system-ui, sans-serif" },
  { mono: "'Fira Code', ui-monospace, monospace", sans: "'Geist', system-ui, sans-serif" },
  { mono: "'Space Mono', ui-monospace, monospace", sans: "'Space Grotesk', system-ui, sans-serif" },
];

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "classic",
  "fontIdx": 0,
  "density": "comfortable",
  "lang": "ko",
  "sectionOrder": ["hero", "projects"],
  "scanlines": true,
  "glow": true
}/*EDITMODE-END*/;

function App() {
  const [state, setState] = React.useState(DEFAULTS);
  const [tweaksActive, setTweaksActive] = React.useState(false);
  const [selectedId, setSelectedId] = React.useState(window.PROJECTS[0].id);

  const strings = window.STRINGS[state.lang];

  const baseTheme = window.THEMES[state.theme];
  const fonts = FONT_STACKS[state.fontIdx];
  const theme = {
    ...baseTheme,
    fontMono: fonts.mono,
    fontSans: state.theme === 'modern' ? fonts.sans : fonts.mono,
    glow: state.glow ? baseTheme.glow : 'none',
  };

  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksActive(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksActive(false);
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (_) {}
    return () => window.removeEventListener('message', handler);
  }, []);

  React.useEffect(() => {
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');
    } catch (_) {}
  }, [state]);

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'Escape' && tweaksActive) setTweaksActive(false);
    };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, [tweaksActive]);

  const reset = () => setState(DEFAULTS);

  const Hero = window.Hero;
  const ProjectsSection = window.ProjectsSection;
  const Tweaks = window.Tweaks;

  const sections = {
    hero: <Hero key="hero" theme={theme} strings={strings} density={state.density} />,
    projects: <ProjectsSection key="projects" theme={theme} strings={strings} lang={state.lang}
                density={state.density} projects={window.PROJECTS}
                selectedId={selectedId} setSelectedId={setSelectedId} />,
  };

  return (
    <div style={{
      background: theme.bg,
      color: theme.text,
      fontFamily: theme.fontMono,
      minHeight: '100vh',
      position: 'relative',
    }}>
      <TopBar theme={theme} state={state} onTweaks={() => setTweaksActive(a => !a)} />
      {state.sectionOrder.map(k => sections[k])}
      <Footer theme={theme} strings={strings} density={state.density} />

      {state.scanlines && theme.scanlines && <Scanlines />}
      <CRTVignette theme={theme} />

      <Tweaks
        active={tweaksActive}
        state={state}
        setState={setState}
        onReset={reset}
      />
    </div>
  );
}

function TopBar({ theme, state, onTweaks }) {
  return (
    <div style={{
      position: 'sticky',
      top: 0,
      zIndex: 100,
      background: `${theme.bg}ee`,
      backdropFilter: 'blur(6px)',
      WebkitBackdropFilter: 'blur(6px)',
      borderBottom: `1px solid ${theme.border}`,
      padding: '8px 16px',
      fontFamily: theme.fontMono,
      fontSize: 11,
      color: theme.textDim,
      display: 'flex',
      alignItems: 'center',
      gap: 14,
    }}>
      <div style={{ display: 'flex', gap: 6 }}>
        <TopDot c={theme.danger} /><TopDot c={theme.warn} /><TopDot c={theme.accent} />
      </div>
      <span style={{ color: theme.text }}>~/portfolio</span>
      <span style={{ color: theme.accent }}>main</span>
      <span>·</span>
      <span>{state.lang === 'ko' ? 'TPM 포트폴리오 · 김종식' : 'TPM portfolio · Kim Jongsik'}</span>
      <button onClick={onTweaks} style={{
        marginLeft: 'auto',
        background: 'transparent',
        border: `1px solid ${theme.border}`,
        color: theme.text,
        padding: '3px 10px',
        fontFamily: 'inherit',
        fontSize: 11,
        cursor: 'pointer',
      }}>$ tweaks</button>
      <span>
        <Blinker c={theme.accent} /> online
      </span>
    </div>
  );
}

function TopDot({ c }) {
  return <span style={{ width: 9, height: 9, background: c, borderRadius: '50%', display: 'inline-block', opacity: 0.85 }} />;
}

function Blinker({ c }) {
  const [on, setOn] = React.useState(true);
  React.useEffect(() => { const t = setInterval(() => setOn(o => !o), 900); return () => clearInterval(t); }, []);
  return <span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: '50%', background: c, marginRight: 6, opacity: on ? 1 : 0.2, boxShadow: `0 0 6px ${c}` }} />;
}

function Footer({ theme, strings, density }) {
  return (
    <section style={{
      padding: density === 'compact' ? '36px 28px' : '64px 48px',
      fontFamily: theme.fontMono,
    }}>
      <div style={{ color: theme.textDim, fontSize: 12, marginBottom: 8 }}># contact</div>
      <div style={{ color: theme.textBright, fontSize: density === 'compact' ? 22 : 28, fontWeight: 700, textShadow: theme.glow, textWrap: 'pretty' }}>
        {strings.contactCTA}
      </div>
      <div style={{ display: 'flex', gap: 12, marginTop: 20, flexWrap: 'wrap' }}>
        <a href="https://github.com/CodingGamePlayer" target="_blank" rel="noopener noreferrer" style={{
          color: theme.textBright, border: `1px solid ${theme.accent}`,
          padding: '10px 18px', textDecoration: 'none', fontSize: 13, fontWeight: 600,
          display: 'inline-flex', alignItems: 'center', gap: 8,
        }}>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38v-1.33c-2.22.48-2.69-1.07-2.69-1.07-.36-.92-.89-1.17-.89-1.17-.73-.5.05-.49.05-.49.8.06 1.23.83 1.23.83.72 1.23 1.89.88 2.35.67.07-.52.28-.88.51-1.08-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.22 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.2c0 .21.15.46.55.38A8 8 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          {strings.githubButton}
        </a>
      </div>
      <div style={{ color: theme.textDim, fontSize: 11, marginTop: 40, borderTop: `1px solid ${theme.border}`, paddingTop: 16 }}>
        built with html + care · 김종식 · otw1917@naver.com · <span style={{ color: theme.accent }}>EOF</span>
      </div>
    </section>
  );
}

function Scanlines() {
  return (
    <div style={{
      position: 'fixed',
      inset: 0,
      pointerEvents: 'none',
      zIndex: 150,
      backgroundImage: 'repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0) 4px)',
      mixBlendMode: 'multiply',
    }} />
  );
}

function CRTVignette({ theme }) {
  if (theme.id === 'modern') return null;
  return (
    <div style={{
      position: 'fixed',
      inset: 0,
      pointerEvents: 'none',
      zIndex: 140,
      background: 'radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%)',
    }} />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
